name: Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHONUTF8: "1"

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Check landing SEO
        run: python tools/check_landing.py

      - name: Check single version source
        run: python tools/check_version_sources.py

      - name: Compile Python sources
        run: python -m compileall -q voice_input main.py tools tests
