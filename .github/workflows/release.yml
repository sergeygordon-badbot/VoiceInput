name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Prepare build environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          '{"repository":"${{ github.repository }}"}' |
            Set-Content -LiteralPath release.json -Encoding utf8

      - name: Verify release version
        shell: pwsh
        run: .\.venv\Scripts\python.exe tools\check_release_version.py "${{ github.ref_name }}"

      - name: Download bundled Whisper model
        shell: pwsh
        run: .\.venv\Scripts\python.exe tools\download_bundled_model.py

      - name: Test
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\build-installer.ps1 -RebuildApp

      - name: Create checksum
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $primary = "dist\installer\Rechka-Setup-$version.exe"
          $legacy = "dist\installer\VoiceInput-Setup-$version.exe"
          $primaryHash = (Get-FileHash -LiteralPath $primary -Algorithm SHA256).Hash.ToLowerInvariant()
          $legacyHash = (Get-FileHash -LiteralPath $legacy -Algorithm SHA256).Hash.ToLowerInvariant()
          "$primaryHash  Rechka-Setup-$version.exe" |
            Set-Content -LiteralPath "$primary.sha256" -Encoding ascii
          "$legacyHash  VoiceInput-Setup-$version.exe" |
            Set-Content -LiteralPath "$legacy.sha256" -Encoding ascii

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          gh release create "${{ github.ref_name }}" `
            "dist\installer\Rechka-Setup-$version.exe" `
            "dist\installer\Rechka-Setup-$version.exe.sha256" `
            "dist\installer\VoiceInput-Setup-$version.exe" `
            "dist\installer\VoiceInput-Setup-$version.exe.sha256" `
            --title "Речка $version — публичная beta" `
            --generate-notes
