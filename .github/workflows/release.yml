name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Determine whether a release is needed
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (python -c "from voice_input import __version__; print(__version__)").Trim()
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            "needed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists; nothing to publish."
          } else {
            "needed=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag will be built from ${{ github.sha }}."
          }

      - name: Prepare build environment
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          '{"repository":"${{ github.repository }}"}' |
            Set-Content -LiteralPath release.json -Encoding utf8

      - name: Verify release version
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe tools\check_release_version.py "${{ steps.release.outputs.tag }}"
          .\.venv\Scripts\python.exe tools\check_version_sources.py
          .\.venv\Scripts\python.exe tools\check_landing.py

      - name: Download bundled Whisper models
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        run: .\.venv\Scripts\python.exe tools\download_bundled_model.py

      - name: Test
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build installer
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\build-installer.ps1 -RebuildApp

      - name: Create checksum
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $primary = "dist\installer\Rechka-Setup-$version.exe"
          $primaryHash = (Get-FileHash -LiteralPath $primary -Algorithm SHA256).Hash.ToLowerInvariant()
          "$primaryHash  Rechka-Setup-$version.exe" |
            Set-Content -LiteralPath "$primary.sha256" -Encoding ascii

      - name: Publish GitHub Release
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.release.outputs.version }}"
          gh release create "${{ steps.release.outputs.tag }}" `
            "dist\installer\Rechka-Setup-$version.exe" `
            "dist\installer\Rechka-Setup-$version.exe.sha256" `
            --target "${{ github.sha }}" `
            --title "Речка $version — публичная beta" `
            --generate-notes `
            --latest

      - name: Verify update channel
        if: steps.release.outputs.needed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $expectedName = "Rechka-Setup-$version.exe"
          $release = gh api "repos/${{ github.repository }}/releases/latest" |
            ConvertFrom-Json
          if ($release.tag_name -ne "${{ steps.release.outputs.tag }}") {
            throw "Latest release is $($release.tag_name), expected ${{ steps.release.outputs.tag }}."
          }
          $asset = $release.assets |
            Where-Object { $_.name -eq $expectedName } |
            Select-Object -First 1
          if ($null -eq $asset) {
            throw "Latest release does not contain $expectedName."
          }
          if (
            $asset.size -le 0 -or
            $asset.digest -notmatch '^sha256:[0-9a-f]{64}$'
          ) {
            throw "GitHub did not publish a trusted size and SHA-256 for $expectedName."
          }
          Write-Host "Update channel verified: $($release.tag_name), $expectedName"
